name: Deploy Edge Functions

on:
  push:
    branches: [main, claude/setup-github-project-Z4ckd]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy generate-titles
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy generate-titles \
            --project-ref enaagkawcosptdeiarbn \
            --no-verify-jwt

      - name: Deploy generate-article
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy generate-article \
            --project-ref enaagkawcosptdeiarbn \
            --no-verify-jwt

      - name: Deploy create-article-doc
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy create-article-doc \
            --project-ref enaagkawcosptdeiarbn \
            --no-verify-jwt
